# db-catalog.toml — the machine-readable table catalog (R0)
#
# Every table the code creates MUST have an entry here with a valid layer.
# Enforced by tests/schema_conformance.rs. Layer model + rules:
# docs/DATA-ARCHITECTURE.md. Generated initially by scripts/db_census.py
# + a classification pass; hand-maintained from now on.
#
# layer: L0 ingest | L1 canonical series | L2 derived (rebuildable) |
#        L3 ledgers (system outputs) | L4 knowledge (curated) | DEAD

[tables.adversary_synthesis_views]
layer = "L3"
purpose = "Adversary pseudo-layer's synthesis-time counter-views"
